<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFlow Dashboard</title>
    <link rel="stylesheet" href="/css/dashboard.css">
</head>

<body>

    <h1>NFlow Dashboard</h1>

    <div class="card">
        <h2>Status do WhatsApp</h2>
        <p class="status">Conectado</p>
    </div>

    <div class="card"
        style="display: flex; flex-direction: column; gap: 12px; justify-content: center; align-items: stretch;">
        <div class="groups-container">

            <div class="groups-header">
                <h3>Grupos</h3>

                <button class="select-all-btn" onclick="toggleSelectAll()">
                    Selecionar Todos
                </button>
            </div>

            <div id="groups" class="groups-list"></div>

        </div>
        <button onclick="listGroups()">
            Listar Grupos
        </button>

        <p id="resultGroup"></p>
    </div>

    <div class="card">
        <h2>Enviar Mensagem</h2>

        <div class="form-group">
            <label>Número</label>
            <input type="text" id="number" placeholder="5585999999999">
        </div>

        <div class="form-group">
            <label>Mensagem</label>
            <textarea id="message" placeholder="Digite sua mensagem"></textarea>
        </div>

        <div class="form-group">
            <label>Imagem</label>
            <input type="file" id="image" accept="image/*">
        </div>

        <div style="display: flex; flex-direction: row; gap: 20px; justify-content: flex-start; align-items: center;">
            <button onclick="sendMessage()">
                Enviar Mensagem
            </button>

            <button onclick="sendCampaign()">
                Enviar Campanha
            </button>
        </div>

        <p id="result"></p>
    </div>

    <script src="/js/dashboard.js"></script>
</body>

</html>
