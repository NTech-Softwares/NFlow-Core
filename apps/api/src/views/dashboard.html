<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NFlow Dashboard</title>
    <link rel="stylesheet" href="/css/dashboard.css" />
  </head>

  <body>
    <div class="container">
      <h1>NFlow Dashboard</h1>

      <div class="row">
        <div class="col-lg-12">
          <div class="card">
            <h2>Status do WhatsApp</h2>
            <p class="status">Conectado</p>
          </div>
        </div>

        <div class="col-lg-6 col-md-12 col-sm-12">
          <div class="card d-flex flex-column gap-1">
            <div class="groups-container">
              <div class="groups-header">
                <h3>Grupos</h3>

                <button class="select-all-btn" onclick="toggleSelectAll()">
                  Selecionar Todos
                </button>
              </div>

              <div id="groups" class="groups-list"></div>
            </div>

            <button onclick="listGroups()">Listar Grupos</button>

            <p id="resultGroup"></p>
          </div>
        </div>

        <div class="col-lg-5 col-md-12 col-sm-12">
          <div class="card">
            <h2>Enviar Mensagem</h2>

            <div class="form-group">
              <label>Número</label>

              <input type="text" id="number" placeholder="5585999999999" />
            </div>

            <div class="form-group">
              <label>Mensagem</label>

              <textarea
                id="message"
                placeholder="Digite sua mensagem"
              ></textarea>
            </div>

            <div class="form-group">
              <label>Imagem</label>

              <input type="file" id="image" accept="image/*" />
            </div>

            <div class="d-flex gap-2 mobile-column">
              <button id="sendMessage" onclick="sendMessage()">
                Enviar Mensagem
              </button>

              <button id="sendCampaign" onclick="sendCampaign()">
                Enviar Campanha
              </button>
            </div>

            <p id="result"></p>
          </div>
        </div>
      </div>
    </div>

    <script src="/js/dashboard.js"></script>
  </body>
</html>
