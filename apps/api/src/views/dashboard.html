<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFlow Dashboard</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: #0f0f0f;
            color: white;
            padding: 40px;
        }

        h1 {
            color: #18eb35;
            margin-bottom: 20px;
        }

        .card {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .status {
            color: #18eb35;
            font-weight: bold;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 16px;
        }

        label {
            color: #ccc;
            font-size: 14px;
        }

        input,
        textarea {
            background: #111;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 12px;
            color: white;
            outline: none;
            font-size: 15px;
        }

        input:focus,
        textarea:focus {
            border-color: #18eb35;
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        button {
            background: #18eb35;
            color: black;
            border: none;
            border-radius: 8px;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            transform: scale(1.02);
        }

        #result {
            margin-top: 15px;
            color: #18eb35;
        }
    </style>
</head>

<body>

    <h1>NFlow Dashboard</h1>

    <div class="card">
        <h2>Status do WhatsApp</h2>
        <p class="status">Conectado</p>
    </div>

    <div class="card">
        <h2>Enviar Mensagem</h2>

        <div class="form-group">
            <label>Número</label>
            <input type="text" id="number" placeholder="5585999999999">
        </div>

        <div class="form-group">
            <label>Mensagem</label>
            <textarea id="message" placeholder="Digite sua mensagem"></textarea>
        </div>

        <button onclick="sendMessage()">
            Enviar Mensagem
        </button>

        <p id="result"></p>
    </div>

    <script>

        async function sendMessage() {

            const number =
                document.getElementById('number').value

            const message =
                document.getElementById('message').value

            const result =
                document.getElementById('result')

            result.innerText = 'Enviando...'

            try {

                const response = await fetch(
                    '/whatsapp/send-message',
                    {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            number,
                            message
                        })
                    }
                )

                const data = await response.json()

                if (data.success) {
                    result.innerText =
                        'Mensagem adicionada na fila com sucesso!'
                } else {
                    result.innerText =
                        'Erro ao enviar mensagem'
                }

            } catch (error) {

                result.innerText =
                    'Erro ao conectar com a API'

                console.log(error)
            }
        }

    </script>

</body>

</html>
