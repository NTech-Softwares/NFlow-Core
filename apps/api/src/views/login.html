<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="stylesheet" href="/css/login.css" />
  </head>

  <body>
    <div class="login-page">
      <div class="login-card card">
        <div class="logo">N</div>

        <h1>Login</h1>

        <p class="subtitle">
          Entre na sua conta para acessar o painel da plataforma.
        </p>

        <form>
          <div class="form-group">
            <label>Usuário</label>
            <input id="username" type="text" placeholder="Digite seu usuário" />
          </div>

          <div class="form-group">
            <label>Senha</label>
            <input
              id="password"
              type="password"
              placeholder="Digite sua senha"
            />
          </div>

          <button onclick="login()" type="submit">Entrar</button>
        </form>

        <div class="footer-text">
          Esqueceu sua senha?
          <a href="#">Recuperar acesso</a>
        </div>
      </div>
    </div>

    <script src="/js/login.js"></script>
  </body>
</html>
