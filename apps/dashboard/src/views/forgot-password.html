<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recuperar Acesso - NFlow Core</title>
    <link rel="stylesheet" href="/css/login.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
  </head>

  <body>
    <div class="login-page">
      <div class="login-card card">
        <div class="logo">N</div>

        <h1>Recuperar Acesso</h1>
        <p class="subtitle">
          Digite o e-mail cadastrado na sua conta para receber as instruções de
          redefinição.
        </p>

        <form id="forgotForm">
          <div class="form-group">
            <label for="email"
              ><i class="fas fa-envelope"></i> E-mail da Conta</label
            >
            <input
              id="email"
              type="email"
              placeholder="Ex: seuemail@ntech.com"
              required
            />
          </div>

          <button onclick="requestRecovery()" type="button">
            Enviar Link <i class="fas fa-paper-plane"></i>
          </button>
        </form>

        <p class="status-message" id="status"></p>

        <div class="footer-text">
          Lembrou a senha? <a href="/login">Voltar para o Login</a>
        </div>
      </div>
    </div>

    <script src="/js/config.js"></script>
    <script src="/js/forgot-password.js"></script>
  </body>
</html>
