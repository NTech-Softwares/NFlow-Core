<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NFlow Core - Registrar Cliente</title>
    <link rel="stylesheet" href="/css/login.css" />
  </head>

  <body>
    <div class="login-page">
      <div class="login-card card">
        <div class="logo">N</div>

        <h1>Cadastro</h1>
        <p class="subtitle">
          Crie uma nova conta de cliente para liberar o acesso ao painel.
        </p>

        <form id="registerForm">
          <div class="form-group">
            <label for="name">Nome / Empresa</label>
            <input
              id="name"
              type="text"
              placeholder="Ex: Mateus - NTech"
              required
            />
          </div>

          <div class="form-group">
            <label for="email">E-mail de Login</label>
            <input
              id="email"
              type="email"
              placeholder="Ex: cliente@ntech.com"
              autocomplete="email"
              required
            />
          </div>

          <div class="form-group">
            <label for="password">Senha de Acesso</label>
            <input
              id="password"
              type="password"
              placeholder="Crie uma senha segura"
              autocomplete="new-password"
              required
            />
          </div>

          <button onclick="register()" type="button">Cadastrar Cliente</button>
        </form>

        <p class="status-message" id="status"></p>

        <div class="footer-text">
          Já possui uma conta ativa?
          <a href="/login">Fazer Login</a>
        </div>
      </div>
    </div>

    <script src="/js/config.js"></script>
    <script src="/js/register.js"></script>
  </body>
</html>
