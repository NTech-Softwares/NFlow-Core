<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Flows</title>

    <link rel="stylesheet" href="/css/flows.css" />
  </head>

  <body>
    <div class="container">
      <div class="page-header">
        <div class="title-group">
          <h1 class="page-title">Flows</h1>
          <p class="page-subtitle">Visualização dos fluxos de atendimento</p>
        </div>

        <button
          type="button"
          class="btn-add-flow"
          onclick="window.location.href = '/criar-flow'"
          style="
            background-color: #18eb35;
            color: #000;
            border: none;
            border-radius: 6px;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 5px;
          "
          onmouseover="
            this.style.backgroundColor = '#13c72b';
            this.style.boxShadow = '0 0 12px rgba(24, 235, 53, 0.4)';
          "
          onmouseout="
            this.style.backgroundColor = '#18eb35';
            this.style.boxShadow = 'none';
          "
        >
          + Novo Fluxo
        </button>
      </div>

      <div id="flows" class="flows-grid"></div>
    </div>

    <div id="message-edit-modal" class="modal-overlay hidden">
      <div class="modal-card">
        <div class="modal-header">
          <h3>✏️ Editar Mensagem</h3>
          <button
            type="button"
            class="btn-close-modal"
            onclick="closeEditModal()"
          >
            ✕
          </button>
        </div>
        <div class="modal-body">
          <p class="modal-instruction">
            Altere o texto enviado pelo bot neste estágio do fluxo:
          </p>
          <textarea
            id="modal-message-input"
            rows="8"
            placeholder="Digite a mensagem do bot..."
          ></textarea>
        </div>
        <div class="modal-footer">
          <button
            type="button"
            class="btn-modal-cancel"
            onclick="closeEditModal()"
          >
            Cancelar
          </button>
          <button type="button" id="btn-modal-save" class="btn-modal-save">
            Salvar Alterações
          </button>
        </div>
      </div>
    </div>

    <div id="step-create-modal" class="modal-overlay hidden">
      <div class="modal-card">
        <div class="modal-header">
          <h3>➕ Adicionar Novo Passo (Step)</h3>
          <button
            type="button"
            class="btn-close-modal"
            onclick="closeStepModal()"
          >
            ✕
          </button>
        </div>
        <div class="modal-body">
          <div style="margin-bottom: 16px">
            <label
              class="modal-instruction"
              style="display: block; font-weight: bold; margin-bottom: 6px"
              >ID do Passo (Gerado Automaticamente):</label
            >
            <input
              type="text"
              id="modal-step-id-input"
              disabled
              style="
                width: 100%;
                background: #1c1c1c;
                color: #8f8f8f;
                border: 1px solid #2a2a2a;
                border-radius: 8px;
                padding: 12px;
                font-size: 14px;
                cursor: not-allowed;
              "
            />
          </div>

          <div style="margin-bottom: 16px">
            <label
              class="modal-instruction"
              style="display: block; font-weight: bold; margin-bottom: 6px"
              >Nome:</label
            >
            <input
              type="text"
              id="modal-step-name-input"
              placeholder="Ex: Menu Financeiro"
              style="
                width: 100%;
                background: #0b141a;
                color: #e9edef;
                border: 1px solid #2a2a2a;
                border-radius: 8px;
                padding: 12px;
                font-size: 14px;
              "
              oninput="handleStepNameAutoFill(this.value)"
            />
          </div>

          <div>
            <label
              class="modal-instruction"
              style="display: block; font-weight: bold; margin-bottom: 6px"
              >Mensagem Inicial do passo:</label
            >
            <textarea
              id="modal-step-message-input"
              rows="5"
              placeholder="Digite a mensagem do bot..."
            ></textarea>
          </div>
        </div>
        <div class="modal-footer">
          <button
            type="button"
            class="btn-modal-cancel"
            onclick="closeStepModal()"
          >
            Cancelar
          </button>
          <button type="button" id="btn-modal-step-save" class="btn-modal-save">
            Criar Passo
          </button>
        </div>
      </div>
    </div>

    <script src="/js/config.js"></script>
    <script src="/js/auth.js"></script>
    
    <script src="/js/flows/api.js"></script>

    <script src="/js/flows/components/option.js"></script>
    <script src="/js/flows/components/step.js"></script>
    <script src="/js/flows/components/flowCard.js"></script>

    <script src="/js/flows/events/selects.js"></script>
    <script src="/js/flows/events/collapse.js"></script>

    <script src="/js/flows/ui/states.js"></script>
    <script src="/js/flows/ui/elements.js"></script>

    <script src="/js/flows/render.js"></script>
    <script src="/js/flows/flows.js"></script>
  </body>
</html>
