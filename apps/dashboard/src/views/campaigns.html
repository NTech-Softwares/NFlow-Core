<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NFlow Dashboard</title>
    <link rel="stylesheet" href="/css/dashboard.css" />
  </head>

  <body>
    <div class="container">
      <div class="page-header">
        <h1>NFlow Dashboard</h1>
        <div class="nav-link-badge">
          <a href="/flows">Bot de atendimento</a>
        </div>
      </div>

      <div class="row">
        <div class="col-12">
          <div class="card status-card">
            <h2>Status do WhatsApp</h2>
            <p class="status" id="status">Conectado</p>
          </div>
        </div>

        <div class="col-12 col-lg-6">
          <div class="card d-flex flex-column gap-2">
            <div class="groups-container">
              <div class="groups-header">
                <h3>Grupos</h3>
                <button class="select-all-btn" onclick="toggleSelectAll()">
                  Selecionar Todos
                </button>
              </div>
              <div id="groups" class="groups-list"></div>
            </div>

            <button class="btn-secondary" onclick="listGroups()">
              Listar Grupos
            </button>
            <p id="resultGroup" class="result-feedback"></p>
          </div>
        </div>

        <div class="col-12 col-lg-6">
          <div class="card">
            <h2>Enviar Mensagem</h2>

            <div class="form-group">
              <label for="number">Número</label>
              <input type="text" id="number" placeholder="5585999999999" />
            </div>

            <div class="form-group">
              <label for="message">Mensagem</label>
              <textarea
                id="message"
                placeholder="Digite sua mensagem"
              ></textarea>
            </div>

            <div class="form-group">
              <label for="image">Imagem</label>
              <input
                type="file"
                id="image"
                accept="image/*"
                class="file-input"
              />
            </div>

            <div class="btn-group mobile-column">
              <button id="sendMessage" onclick="sendMessage()">
                Enviar Mensagem
              </button>
              <button id="sendCampaign" onclick="sendCampaign()">
                Enviar Campanha
              </button>
            </div>

            <p id="result" class="result-feedback"></p>
          </div>
        </div>
      </div>
    </div>

    <script src="/js/config.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/dashboard.js"></script>
  </body>
</html>
