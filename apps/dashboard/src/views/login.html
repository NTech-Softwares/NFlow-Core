<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="stylesheet" href="/css/login.css" />
  </head>

  <body>
    <div class="login-page">
      <div class="login-card card">
        <div class="logo">N</div>

        <h1>Login</h1>
        <p class="subtitle">
          Entre na sua conta para acessar o painel da plataforma.
        </p>

        <form>
          <div class="form-group">
            <label for="username">Usuário</label>
            <input
              id="username"
              type="text"
              placeholder="Digite seu usuário"
              autocomplete="username"
            />
          </div>

          <div class="form-group">
            <label for="password">Senha</label>
            <input
              id="password"
              type="password"
              placeholder="Digite sua senha"
              autocomplete="current-password"
            />
          </div>

          <button onclick="login()" type="button">Entrar</button>
        </form>

        <p class="status-message" id="status"></p>

        <div class="footer-text">
          Não Automatizou seu whatsapp ainda?
          <a href="/register">Criar Conta</a>
        </div>
        <div class="footer-text">
          Esqueceu sua senha?
          <a href="/forgot-password">Recuperar acesso</a>
        </div>
      </div>
    </div>

    <script src="/js/config.js"></script>
    <script src="/js/login.js"></script>
  </body>
</html>
