<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Criar Novo Fluxo</title>
    <link rel="stylesheet" href="/css/create-flow.css" />
  </head>
  <body>
    <div class="container">
      <div class="card wizard-card">
        <div id="step-1" class="wizard-step active">
          <div class="progress-indicator">Etapa 1 de 3</div>
          <h1>Novo Fluxo</h1>
          <p class="subtitle">
            Defina o Nome exclusivo para este fluxo de atendimento.
          </p>

          <div class="form-group">
            <label for="flow-id">Nome do Fluxo</label>
            <input
              type="text"
              id="flow-id"
              placeholder="Ex: suporte, vendas, financeiro"
              autocomplete="off"
            />
          </div>

          <div class="wizard-actions">
            <button type="button" onclick="proximaEtapa()">
              Avançar &rarr;
            </button>
          </div>
        </div>

        <div id="step-2" class="wizard-step">
          <div class="progress-indicator">Etapa 2 de 3</div>
          <h1>Passo Inicial</h1>
          <p class="subtitle">
            Determine o nome do primeiro passo dentro deste fluxo.
          </p>

          <div class="form-group">
            <label for="initial-step">Nome do Passo Inicial</label>
            <input
              type="text"
              id="initial-step"
              value="inicio"
              placeholder="Ex: inicio, menu, bem_vindo"
              autocomplete="off"
            />
          </div>

          <div class="wizard-actions split">
            <button
              type="button"
              class="btn-secondary"
              onclick="etapaAnterior()"
            >
              &larr; Voltar
            </button>
            <button type="button" onclick="proximaEtapa()">
              Avançar &rarr;
            </button>
          </div>
        </div>

        <div id="step-3" class="wizard-step">
          <div class="progress-indicator">Etapa 3 de 3</div>
          <h1>Mensagem do Passo</h1>
          <p class="subtitle">
            Digite o menu de opções ou texto explicativo pertencente a este
            Passo específico.
          </p>

          <div class="form-group">
            <label for="step-message">Mensagem Inicial do Passo</label>
            <textarea
              id="step-message"
              placeholder="Ex: 👋 Olá! Seja bem-vindo(a)&#10;&#10;1 - Suporte&#10;2 - Financeiro&#10;&#10;Digite a opção desejada."
            ></textarea>
          </div>

          <div class="wizard-actions split">
            <button
              type="button"
              class="btn-secondary"
              onclick="etapaAnterior()"
            >
              &larr; Voltar
            </button>
            <button type="button" onclick="concluirWizard()">
              Concluir e Salvar
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="/js/config.js"></script>
    <script src="/js/flows/auth.js"></script>
    <script src="/js/flows/api.js"></script>
    <script src="/js/flows/ui/wizard.js"></script>
  </body>
</html>
